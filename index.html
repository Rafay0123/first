<body>
    <div class="cont">
        <h1>Sign Up</h1>
        <form action="">
            <div class="first">
                <label for="">Name :</label>
                <input type="text" placeholder="jon">
            </div>
            <br>
            <div class="first">
                <label for="">Email :</label>
                <input type="email" placeholder="abc@EMAIL.gmail" required onclick="alert('sign up ******')">
            </div>
            <br>
            <div class="first">
                <label for="">Phone :</label>
                <input type="number" value="12345">
            </div>
            <br>
            <div class="first">
                <label for="">Password :</label>
                <input type="password" required placeholder="****" minlength="4">
            </div>
            <br>
            <div class="first" style="margin-top: 20px;">
                <button onclick="alert('Design by rafayy')">Sign in</button>
            </div>
        </form>
    </div>
